{% extends "base.html" %}
{% block title %}Login – BlogSphere{% endblock %}
{% block content %}
<div class="container">
    <div class="form-box mt-4">
        <h4 class="mb-1">Login</h4>
        <p class="text-muted mb-4" style="font-size:13px;">Welcome back! Sign in to your account.</p>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn-primary-custom w-100 py-2">Login</button>
        </form>
        <p class="text-center mt-3" style="font-size:13px; color:#888;">
            Don't have an account? <a href="{{ url_for('register') }}" style="color:#1e3a5f; font-weight:600;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
