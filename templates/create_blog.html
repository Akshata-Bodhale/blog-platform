{% extends "base.html" %}
{% block title %}Write a Blog – InkSpire{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.snow.css">
<style>
    #quill-editor { min-height: 280px; font-size: 15px; background: #fff; }
    .ql-toolbar { border: 1px solid #d0d8e4 !important; border-radius: 5px 5px 0 0; }
    .ql-container { border: 1px solid #d0d8e4 !important; border-top: none !important; border-radius: 0 0 5px 5px; }
</style>
{% endblock %}
{% block content %}
<div class="container">
    <div style="background:#fff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.07); padding:30px; max-width:820px; margin:0 auto;">
        <h4 style="color:#1e3a5f; font-weight:700; margin-bottom:4px;">Write a New Blog</h4>
        <p class="text-muted mb-4" style="font-size:13px;">Share your story with the world.</p>

        <form method="POST" enctype="multipart/form-data" id="blogForm">
            <div class="mb-3">
                <label class="form-label fw-semibold" style="font-size:14px;">Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter blog title..." required maxlength="255" style="font-size:15px; border:1px solid #d0d8e4; padding:10px 14px;">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold" style="font-size:14px;">Category</label>
                <select name="category" class="form-select" required style="font-size:14px; border:1px solid #d0d8e4; padding:10px 14px;">
                    <option value="">Select category...</option>
                    {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold" style="font-size:14px;">Content</label>
                <div id="quill-editor"></div>
                <input type="hidden" name="description" id="description-hidden">
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold" style="font-size:14px;">Featured Image <span class="text-muted fw-normal">(optional)</span></label>
                <div id="uploadArea" style="border:2px dashed #d0d8e4; border-radius:6px; padding:24px; text-align:center; cursor:pointer; background:#fafbfc;">
                    <i class="fas fa-image fa-2x text-secondary mb-2"></i>
                    <p class="mb-0 text-muted" style="font-size:13px;">Click to upload an image (PNG, JPG, max 10MB)</p>
                    <input type="file" id="imageFile" name="image" accept="image/*" style="display:none;">
                </div>
                <img id="preview" style="display:none; max-width:100%; max-height:220px; border-radius:6px; margin-top:10px;">
            </div>

            <button type="submit" class="btn-primary-custom w-100 py-2" style="font-size:15px;">Publish Blog</button>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.js"></script>
<script>
const quill = new Quill('#quill-editor', {
    theme: 'snow',
    modules: { toolbar: [[{header:[1,2,3,false]}],['bold','italic','underline'],['blockquote'],['link'],['clean']] },
    placeholder: 'Start writing your blog post...'
});
document.getElementById('blogForm').addEventListener('submit', function(e) {
    if (quill.getText().trim().length < 20) { e.preventDefault(); alert('Please write some content first.'); return; }
    document.getElementById('description-hidden').value = quill.root.innerHTML;
});
const area = document.getElementById('uploadArea');
const fileInput = document.getElementById('imageFile');
const preview = document.getElementById('preview');
area.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', function() {
    const f = this.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; area.style.borderStyle = 'solid'; };
    r.readAsDataURL(f);
});
</script>
{% endblock %}
