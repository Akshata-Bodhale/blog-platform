{% extends "base.html" %}
{% block title %}Create Profile – InkSpire{% endblock %}
{% block content %}
<div class="container">
    <div class="form-box mt-2" style="max-width:520px;">
        <h4 class="mb-1">Create Author Profile</h4>
        <p class="text-muted mb-4" style="font-size:13px;">Set up your profile before publishing your first blog.</p>
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3 text-center">
                <div id="avatarBox" onclick="document.getElementById('photo').click()"
                     style="width:90px;height:90px;border-radius:50%;border:2px dashed #ccc;display:flex;align-items:center;justify-content:center;font-size:28px;color:#bbb;cursor:pointer;overflow:hidden;margin:0 auto;">
                    <i class="fas fa-camera"></i>
                </div>
                <input type="file" name="photo" id="photo" accept="image/*" style="display:none;">
                <p style="font-size:12px;color:#aaa;margin-top:6px;">Click to upload photo</p>
            </div>
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Bio</label>
                <textarea name="bio" class="form-control" rows="4" placeholder="Tell readers about yourself..."></textarea>
            </div>
            <button type="submit" class="btn-primary-custom w-100 py-2">Create Profile</button>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('photo').addEventListener('change', function() {
    const f = this.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = e => { document.getElementById('avatarBox').innerHTML = '<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover;">'; };
    r.readAsDataURL(f);
});
</script>
{% endblock %}
