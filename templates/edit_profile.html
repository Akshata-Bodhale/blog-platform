{% extends "base.html" %}
{% block title %}Edit Profile – InkSpire{% endblock %}
{% block content %}
<div class="container">
    <div class="form-box mt-2" style="max-width:520px;">
        <h4 class="mb-1">Edit Profile</h4>
        <p class="text-muted mb-4" style="font-size:13px;">Update your author information.</p>
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3 text-center">
                <div id="avatarBox" onclick="document.getElementById('photo').click()"
                     style="width:90px;height:90px;border-radius:50%;border:2px solid #1e3a5f;overflow:hidden;cursor:pointer;margin:0 auto;">
                    {% if profile[4] %}
                    <img src="{{ url_for('static', filename=profile[4]) }}" style="width:100%;height:100%;object-fit:cover;" alt="" id="avatarImg">
                    {% else %}
                    <div style="width:100%;height:100%;background:#1e3a5f;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;"><i class="fas fa-camera"></i></div>
                    {% endif %}
                </div>
                <input type="file" name="photo" id="photo" accept="image/*" style="display:none;">
                <p style="font-size:12px;color:#aaa;margin-top:6px;">Click to change photo</p>
            </div>
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control" value="{{ profile[2] }}" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Bio</label>
                <textarea name="bio" class="form-control" rows="4">{{ profile[3] or '' }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn-primary-custom flex-grow-1 py-2">Save Changes</button>
                <a href="{{ url_for('author_profile', username=session.username) }}" class="btn btn-outline-secondary py-2 px-4" style="font-size:14px;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('photo').addEventListener('change', function() {
    const f = this.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = e => { document.getElementById('avatarBox').innerHTML = '<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover;">'; };
    r.readAsDataURL(f);
});
</script>
{% endblock %}
